services:
  edu-system:
    image: feeeng/edu-system:latest
    container_name: edu-system
    pull_policy: always
    environment:
      DATA_STORE: sqlite
      SQLITE_DB_PATH: /app/data/deliveries.sqlite
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-admin123}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
