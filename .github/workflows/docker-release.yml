name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "镜像和 Release 标签，默认使用 latest"
        required: false
        default: "latest"
      push_latest:
        description: "非 latest 标签时是否同步推送 latest"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

env:
  DOCKER_IMAGE: feeeng/edu-system

jobs:
  docker-release:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.tag }}"
          fi

          if [[ -z "${version}" ]]; then
            version="latest"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        shell: bash
        run: |
          args=(--tag "${{ steps.version.outputs.version }}" --push)

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push_latest }}" == "false" ]]; then
            args+=(--no-latest)
          fi

          sh scripts/docker-build-push.sh "${args[@]}"

      - name: Create GitHub Release
        if: startsWith(steps.version.outputs.version, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
